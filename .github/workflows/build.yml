name: Build binaries

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          
      - name: Install local PyGOST
        run: |
          pip install ./pygost
          
      - name: Install dependencies
        run: |
          pip install nuitka

      - name: Build
        run: |
          python -m nuitka --onefile --assume-yes-for-downloads gost_34102012.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: |
            *.exe
            *.bin
